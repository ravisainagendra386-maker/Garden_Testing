# .gitea/workflows/test.yml
# Gitea Actions pipeline — runs automatically on every push
# Compatible with GitHub Actions syntax

name: Garden Finance E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run tests every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to test'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, mainnet]

env:
  NODE_VERSION: '18'

jobs:
  api-tests:
    name: API Health Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          GARDEN_ENV=${{ inputs.env || 'testnet' }}
          GARDEN_API_KEY=${{ secrets.GARDEN_API_KEY }}
          PRIVY_APP_ID=${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET=${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_EVM_WALLET_ID=${{ secrets.PRIVY_EVM_WALLET_ID }}
          PRIVY_SOLANA_WALLET_ID=${{ secrets.PRIVY_SOLANA_WALLET_ID }}
          PRIVY_SUI_WALLET_ID=${{ secrets.PRIVY_SUI_WALLET_ID }}
          PRIVY_STARKNET_WALLET_ID=${{ secrets.PRIVY_STARKNET_WALLET_ID }}
          PRIVY_TRON_WALLET_ID=${{ secrets.PRIVY_TRON_WALLET_ID }}
          BTC_PRIVATE_KEY_WIF=${{ secrets.BTC_PRIVATE_KEY_WIF }}
          BTC_ADDRESS=${{ secrets.BTC_ADDRESS }}
          MANUAL_APPROVE=false
          PORT=3000
          EOF

      - name: Validate environment
        run: node src/config.js

      - name: Run API tests
        run: node -e "
          require('./src/config');
          const runner = require('./src/tests/runner');
          runner.runApiTests().then(results => {
            const failed = results.filter(r => r.status === 'fail');
            console.log(JSON.stringify(results, null, 2));
            if (failed.length) { console.error('FAILED:', failed.map(r=>r.name)); process.exit(1); }
            console.log('All API tests passed');
          }).catch(e => { console.error(e); process.exit(1); });
        "

  e2e-tests:
    name: E2E Route Tests
    runs-on: ubuntu-latest
    needs: api-tests
    # Only run E2E on manual dispatch or main branch pushes
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          GARDEN_ENV=${{ inputs.env || 'testnet' }}
          GARDEN_API_KEY=${{ secrets.GARDEN_API_KEY }}
          PRIVY_APP_ID=${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET=${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_EVM_WALLET_ID=${{ secrets.PRIVY_EVM_WALLET_ID }}
          PRIVY_SOLANA_WALLET_ID=${{ secrets.PRIVY_SOLANA_WALLET_ID }}
          PRIVY_SUI_WALLET_ID=${{ secrets.PRIVY_SUI_WALLET_ID }}
          PRIVY_STARKNET_WALLET_ID=${{ secrets.PRIVY_STARKNET_WALLET_ID }}
          PRIVY_TRON_WALLET_ID=${{ secrets.PRIVY_TRON_WALLET_ID }}
          BTC_PRIVATE_KEY_WIF=${{ secrets.BTC_PRIVATE_KEY_WIF }}
          BTC_ADDRESS=${{ secrets.BTC_ADDRESS }}
          MANUAL_APPROVE=false
          PORT=3000
          EOF

      - name: Run E2E tests
        run: node src/tests/runner.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30
